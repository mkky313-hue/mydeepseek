<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>✨ My DeepSeek · 全能AI聊天室</title>
    <style>
        /* ========== 主题变量 ========== */
        :root {
            --bg-primary: linear-gradient(145deg, #1a1e2c 0%, #2a2f3f 100%);
            --bg-sidebar: rgba(30, 35, 48, 0.95);
            --bg-card: rgba(30, 35, 48, 0.75);
            --bg-nav: rgba(30, 35, 48, 0.8);
            --bg-input: #1e2436;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #eef2ff;
            --text-secondary: #c0d0e0;
            --text-muted: #7a8aa0;
            --accent-color: #2e6b5e;
            --accent-hover: #3e8b7a;
            --bubble-user: linear-gradient(135deg, #2e6b5e, #1f4e44);
            --bubble-ai: rgba(50, 58, 75, 0.85);
        }
        [data-theme="light"] {
            --bg-primary: linear-gradient(145deg, #f5f7fa 0%, #e8ecf2 100%);
            --bg-sidebar: rgba(255, 255, 255, 0.95);
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-nav: rgba(255, 255, 255, 0.9);
            --bg-input: #ffffff;
            --border-color: rgba(0, 0, 0, 0.08);
            --text-primary: #1a1e2c;
            --text-secondary: #3a4258;
            --text-muted: #8e9aaf;
            --accent-color: #2e6b5e;
            --bubble-user: linear-gradient(135deg, #2e6b5e, #1f4e44);
            --bubble-ai: #e9ecef;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, system-ui, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            transition: background 0.3s;
        }
        .app-wrapper { display: flex; min-height: 100vh; position: relative; }

        /* 侧边栏 */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
        }
        .sidebar.collapsed { transform: translateX(-280px); }
        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        .sidebar-header h3 {
            font-size: 1.1rem;
            font-weight: 500;
            background: linear-gradient(135deg, #c0e0ff, #a3b8f0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .sidebar-nav { padding: 0.5rem 0; }
        .nav-item {
            padding: 8px 1rem;
            margin: 2px 8px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .nav-item:hover { background: rgba(128,128,128,0.1); color: var(--text-primary); }
        .history-divider { border-top: 1px solid var(--border-color); margin: 8px 12px; }
        .history-header { padding: 8px 16px; font-size: 0.75rem; color: var(--text-muted); display: flex; justify-content: space-between; }
        .history-list { max-height: 240px; overflow-y: auto; flex: 1; }
        .history-item {
            padding: 6px 12px; margin: 2px 8px; border-radius: 8px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            color: var(--text-secondary); font-size: 0.85rem;
        }
        .history-item:hover { background: rgba(128,128,128,0.1); }
        .history-item.active { background: rgba(46,107,94,0.3); color: #a3e0d0; }
        .history-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.2s; }
        .history-item:hover .history-actions { opacity: 1; }
        .history-action-btn {
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; font-size: 0.7rem; padding: 2px 4px; border-radius: 4px;
        }
        .history-action-btn:hover { background: rgba(128,128,128,0.2); color: var(--text-primary); }
        .storage-info { padding: 10px 1rem; font-size: 0.7rem; color: var(--text-muted); border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); }
        .sidebar-footer { padding: 0.8rem 1rem; display: flex; gap: 12px; border-top: 1px solid var(--border-color); flex-wrap: wrap; }
        .footer-btn {
            background: none; border: none; color: var(--text-secondary); font-size: 0.8rem;
            cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 6px 10px; border-radius: 20px;
        }
        .footer-btn:hover { background: rgba(128,128,128,0.1); color: var(--text-primary); }

        /* 主内容区 */
        .main-content {
            flex: 1;
            margin-left: 280px;
            transition: margin-left 0.3s;
            min-height: 100vh;
        }
        .main-content.expanded { margin-left: 0; }

        /* 顶部导航 - 自适应搜索模式 */
        .top-nav {
            background: var(--bg-nav);
            backdrop-filter: blur(10px);
            padding: 0.8rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            border-bottom: 1px solid var(--border-color);
        }
        .top-nav-left { flex-shrink: 0; }
        .top-nav-center {
            flex: 1;
            text-align: center;
            transition: all 0.2s;
        }
        .top-nav-center h1 {
            font-size: 1.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #c0e0ff, #a3b8f0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            white-space: nowrap;
            display: inline-block;
        }
        .search-input-wrapper {
            display: none;
            align-items: center;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 6px 12px;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
        }
        .search-input-wrapper.active { display: flex; }
        .search-input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        .search-input-wrapper button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
        }
        .top-nav-right { display: flex; gap: 8px; flex-shrink: 0; }
        .hamburger-icon, .icon-btn {
            background: rgba(128,128,128,0.2);
            border: none;
            color: var(--text-primary);
            font-size: 1.2rem;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* 聊天区域 */
        .chat-container {
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 1rem auto;
            padding: 0.5rem;
            min-height: calc(100vh - 80px);
        }
        .chat-messages {
            flex: 1;
            min-height: 400px;
            max-height: calc(100vh - 180px);
            overflow-y: auto;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }
        .message.user { align-self: flex-end; }
        .message.ai { align-self: flex-start; }
        .bubble {
            padding: 0.7rem 1rem;
            border-radius: 1.2rem;
            line-height: 1.5;
            font-size: 0.92rem;
            word-break: break-word;
            white-space: pre-wrap;
        }
        .user .bubble { background: var(--bubble-user); color: white; border-bottom-right-radius: 0.3rem; }
        .ai .bubble { background: var(--bubble-ai); color: var(--text-primary); border-bottom-left-radius: 0.3rem; border: 1px solid var(--border-color); }
        .message-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 4px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .message-wrapper:hover .message-actions { opacity: 1; }
        .msg-action {
            background: rgba(128,128,128,0.3);
            border: none;
            border-radius: 12px;
            padding: 2px 6px;
            font-size: 0.7rem;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .msg-action:hover { background: var(--accent-color); color: white; }
        .thinking .bubble { background: rgba(128,128,128,0.2); display: flex; align-items: center; gap: 8px; }
        .dot-floating { display: inline-flex; gap: 4px; }
        .dot-floating span { width: 8px; height: 8px; background: var(--text-muted); border-radius: 50%; animation: float 1.4s infinite; }
        @keyframes float { 0%,100%{transform:scale(0.6);opacity:0.4;} 50%{transform:scale(1);opacity:1;} }
        .input-section {
            background: var(--bg-card);
            border-radius: 1rem;
            padding: 0.8rem;
            margin-top: 1rem;
        }
        .input-row { display: flex; gap: 10px; align-items: flex-end; }
        .input-wrapper { flex: 1; background: var(--bg-input); border-radius: 24px; padding: 6px 12px; border: 1px solid var(--border-color); }
        textarea { width: 100%; background: transparent; border: none; color: var(--text-primary); font-size: 0.9rem; font-family: inherit; resize: none; outline: none; }
        .send-btn { background: linear-gradient(135deg, #3b6e62, #2c554a); border: none; color: white; padding: 6px 16px; border-radius: 24px; cursor: pointer; }
        .action-buttons { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .action-btn {
            background: rgba(128,128,128,0.2); border: 1px solid var(--border-color);
            color: var(--text-secondary); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; cursor: pointer;
        }
        .action-btn.active { background: var(--accent-color); color: white; }
        .welcome-message { text-align: center; color: var(--text-muted); background: rgba(128,128,128,0.1); padding: 1rem; border-radius: 1rem; }

        /* 模态框通用 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .modal-overlay.active { display: flex; }
        .modal-container {
            background: var(--bg-card);
            width: 100%;
            max-width: 600px;
            max-height: 80vh;
            border-radius: 1.5rem;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        .modal-header h3 { color: #a3e0d0; }
        .modal-close {
            background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-secondary);
        }
        .modal-body { padding: 1rem; }
        .modal-footer {
            padding: 1rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn-save, .btn-primary { background: var(--accent-color); border: none; color: white; padding: 6px 16px; border-radius: 20px; cursor: pointer; }
        .btn-secondary { background: rgba(128,128,128,0.2); border: none; color: var(--text-secondary); padding: 6px 16px; border-radius: 20px; cursor: pointer; }

        /* 指令/角色卡片样式 */
        .instruction-card, .role-card {
            background: var(--bg-input);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border-color);
        }
        .instruction-title, .role-name { font-weight: 600; color: #a3e0d0; margin-bottom: 0.5rem; }
        .instruction-content, .role-desc { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 0.8rem; }
        .card-actions { display: flex; gap: 8px; justify-content: flex-end; }
        .card-btn {
            background: rgba(128,128,128,0.2); border: none; color: var(--text-secondary);
            padding: 4px 12px; border-radius: 16px; cursor: pointer; font-size: 0.75rem;
        }
        .card-btn.primary { background: var(--accent-color); color: white; }
        .empty-placeholder { text-align: center; padding: 2rem; color: var(--text-muted); }

        /* 设置内部样式 */
        .settings-section { margin-bottom: 1.2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-color); }
        .settings-section h4 { color: #a3e0d0; margin-bottom: 8px; font-size: 0.9rem; }
        .font-size-options { display: flex; gap: 8px; flex-wrap: wrap; }
        .font-option { background: rgba(128,128,128,0.2); padding: 4px 12px; border-radius: 16px; cursor: pointer; font-size: 0.8rem; }
        .font-option.active { background: var(--accent-color); color: white; }
        .model-select, .api-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-primary); padding: 8px; border-radius: 8px; }

        /* 预览弹窗 */
        .preview-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 300;
            justify-content: center;
            align-items: center;
        }
        .preview-modal.active { display: flex; }
        .preview-content {
            background: var(--bg-input);
            width: 90%; height: 85%;
            border-radius: 1rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .preview-header { padding: 0.8rem; background: var(--bg-card); display: flex; justify-content: space-between; }
        .preview-iframe { flex: 1; border: none; background: white; }

        /* 手机自适应 */
        @media (max-width: 768px) {
            .sidebar { width: 260px; }
            .main-content { margin-left: 0; }
            .sidebar.collapsed { transform: translateX(-260px); }
            .top-nav-center h1 { font-size: 1rem; white-space: nowrap; }
            .search-input-wrapper { max-width: 200px; }
            .chat-container { padding: 0.5rem; }
            .message-wrapper { max-width: 90%; }
            .modal-container { max-width: 95%; }
            .footer-btn { font-size: 0.7rem; padding: 4px 8px; }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><h3>My DeepSeek</h3></div>
        <div class="sidebar-nav">
            <div class="nav-item" data-type="market">📋 指令市场</div>
            <div class="nav-item" data-type="manage">📝 指令管理</div>
            <div class="nav-item" data-type="role">🎭 角色卡管理</div>
        </div>
        <div class="history-divider"></div>
        <div class="history-header"><span>📋 历史对话</span><span style="font-size:0.7rem;">导出/导入</span></div>
        <div class="history-list" id="historyList"></div>
        <div class="storage-info" id="storageInfo">本地存储容量 0KB / 5MB (0%)</div>
        <div class="sidebar-footer">
            <button class="footer-btn" id="favoriteStarBtn">⭐ 收藏</button>
            <button class="footer-btn" id="settingsFooterBtn">⚙️ 设置</button>
            <button class="footer-btn" id="exportDataBtn">📤 导出</button>
            <button class="footer-btn" id="importDataBtn">📥 导入</button>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="top-nav">
            <div class="top-nav-left">
                <button class="hamburger-icon" id="toggleSidebarBtn">☰</button>
            </div>
            <div class="top-nav-center">
                <h1 id="mainTitle">✨ My DeepSeek</h1>
                <div class="search-input-wrapper" id="searchWrapper">
                    <span>🔍</span>
                    <input type="text" id="searchInput" placeholder="搜索对话内容...">
                    <button id="closeSearchBtn">✕</button>
                </div>
            </div>
            <div class="top-nav-right">
                <button class="icon-btn" onclick="createNewDialog()">➕</button>
                <button class="icon-btn" id="searchIconBtn">🔍</button>
            </div>
        </div>

        <div id="chatPanel" class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="welcome-message">✨ 欢迎！输入你的问题，我会用心回答你 ✨</div>
            </div>
            <div class="input-section">
                <div class="input-row">
                    <div class="input-wrapper"><textarea id="userInput" rows="1" placeholder="在这里输入你的问题... Enter发送，Shift+Enter换行"></textarea></div>
                    <button class="send-btn" onclick="sendMessage()">✈️ 发送</button>
                </div>
                <div class="action-buttons">
                    <button class="action-btn" id="deepThinkBtn" onclick="toggleDeepThink()">🧠 深度思考</button>
                    <button class="action-btn" id="previewModeBtn" onclick="togglePreviewMode()">🔮 预览网页</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 通用模态框 -->
<div id="genericModal" class="modal-overlay"><div class="modal-container"><div class="modal-header"><h3 id="modalTitle">标题</h3><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body" id="modalBody"></div><div class="modal-footer" id="modalFooter"></div></div></div>

<!-- 设置弹窗 -->
<div id="settingsModal" class="modal-overlay"><div class="modal-container"><div class="modal-header"><h3>⚙️ 设置</h3><button class="modal-close" onclick="closeSettingsModal()">✕</button></div><div class="modal-body" id="settingsBody"></div><div class="modal-footer"><button class="btn-secondary" onclick="closeSettingsModal()">取消</button><button class="btn-save" id="saveSettingsBtn">保存并关闭</button></div></div></div>

<!-- API Key 首次弹窗 -->
<div id="apiKeyModal" class="modal-overlay"><div class="modal-container" style="max-width:400px"><div class="modal-header"><h3>🔑 设置 API Key</h3><button class="modal-close" onclick="closeApiKeyModal()">✕</button></div><div class="modal-body"><p style="margin-bottom:12px">请填写你的 DeepSeek API Key：</p><input type="password" id="firstApiKey" placeholder="sk-..." style="width:100%; background:var(--bg-input); border:1px solid var(--border-color); padding:8px; border-radius:20px;"></div><div class="modal-footer"><button class="btn-secondary" onclick="closeApiKeyModal()">稍后</button><button class="btn-save" id="saveFirstApiKeyBtn">保存</button></div></div></div>

<!-- 收藏弹窗 -->
<div id="favoriteModal" class="modal-overlay"><div class="modal-container"><div class="modal-header"><h3>⭐ 收藏栏</h3><button class="modal-close" onclick="closeFavoriteModal()">✕</button></div><div class="modal-body" id="favoriteListContainer"></div><div class="modal-footer"><button class="btn-secondary" onclick="closeFavoriteModal()">关闭</button></div></div></div>

<!-- 预览弹窗 -->
<div id="previewModal" class="preview-modal"><div class="preview-content"><div class="preview-header"><span>🌐 网页预览</span><button class="icon-btn" onclick="closePreview()" style="background:none">✕</button></div><iframe id="previewIframe" class="preview-iframe" sandbox="allow-same-origin allow-scripts"></iframe></div></div>

<script>
    // ==================== 全局变量 ====================
    let DEEPSEEK_API_KEY = localStorage.getItem('deepseek_api_key') || '';
    let deepThinkEnabled = false;
    let previewModeEnabled = false;
    let currentModel = localStorage.getItem('selected_model') || 'deepseek-chat';
    let conversations = [];
    let currentConvId = null;
    let instructions = [];
    let roles = [];
    let favorites = [];
    let currentModalType = null;
    const API_URL = "https://api.deepseek.com/v1/chat/completions";

    // ==================== 初始化 ====================
    document.addEventListener('DOMContentLoaded', () => {
        loadInstructions();
        loadRoles();
        loadFavorites();
        loadConversations();
        updateStorageInfo();
        setupSettingsUI();
        if (!DEEPSEEK_API_KEY) document.getElementById('apiKeyModal').classList.add('active');
        document.getElementById('toggleSidebarBtn').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('collapsed');
            document.getElementById('mainContent').classList.toggle('expanded');
        });
        // 侧边栏菜单
        document.querySelectorAll('.nav-item').forEach(el => {
            el.addEventListener('click', () => {
                const type = el.getAttribute('data-type');
                if (type === 'market') openMarketModal();
                else if (type === 'manage') openManageModal();
                else if (type === 'role') openRoleModal();
            });
        });
        document.getElementById('favoriteStarBtn').addEventListener('click', openFavoriteModal);
        document.getElementById('settingsFooterBtn').addEventListener('click', openSettingsModal);
        document.getElementById('exportDataBtn').addEventListener('click', exportAllData);
        document.getElementById('importDataBtn').addEventListener('click', importAllData);
        // 搜索相关
        const searchIcon = document.getElementById('searchIconBtn');
        const searchWrapper = document.getElementById('searchWrapper');
        const mainTitle = document.getElementById('mainTitle');
        const closeSearchBtn = document.getElementById('closeSearchBtn');
        const searchInput = document.getElementById('searchInput');
        searchIcon.addEventListener('click', () => {
            mainTitle.style.display = 'none';
            searchWrapper.classList.add('active');
            searchInput.focus();
        });
        closeSearchBtn.addEventListener('click', () => {
            mainTitle.style.display = 'inline-block';
            searchWrapper.classList.remove('active');
            searchInput.value = '';
        });
        searchInput.addEventListener('input', performSearch);
        document.getElementById('saveSettingsBtn').addEventListener('click', saveAllSettings);
        document.getElementById('saveFirstApiKeyBtn').addEventListener('click', saveFirstApiKey);
    });

    function performSearch() {
        const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
        if (!keyword) return;
        let results = [];
        for (let conv of conversations) {
            for (let idx = 0; idx < conv.messages.length; idx++) {
                const msg = conv.messages[idx];
                if (msg.content.toLowerCase().includes(keyword)) {
                    results.push({ convId: conv.id, convTitle: conv.title, messageIndex: idx, content: msg.content, role: msg.role });
                }
            }
        }
        if (results.length === 0) { alert('未找到相关消息'); return; }
        const first = results[0];
        switchConversation(first.convId);
        setTimeout(() => {
            const msgElements = document.querySelectorAll('.message-wrapper');
            if (msgElements[first.messageIndex]) msgElements[first.messageIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
        document.getElementById('closeSearchBtn').click();
        alert(`找到 ${results.length} 条结果，已跳转到第一条`);
    }

    // ==================== 设置UI ====================
    function setupSettingsUI() {
        const container = document.getElementById('settingsBody');
        container.innerHTML = `

    async function generateSmartInstruction() {
        const btn = document.getElementById('smartGenBtn');
        btn.textContent = '生成中...';
        btn.disabled = true;
        try {
            let newInstruction = null;
            if (DEEPSEEK_API_KEY) {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${DEEPSEEK_API_KEY}` },
                    body: JSON.stringify({ model: currentModel, messages: [{ role: 'user', content: '请生成一个【角色扮演】类的指令，格式为：标题（一句概括） + 换行 + 详细描述。要求有创意，大约100字。只输出指令文本，不要额外说明。' }], stream: false })
                });
                if (response.ok) {
                    const data = await response.json();
                    const content = data.choices[0].message.content;
                    const lines = content.split('\n');
                    const title = lines[0].substring(0, 40) || '智能生成指令';
                    newInstruction = { id: Date.now(), title: title, content: content, type: 'ai' };
                }
            }
            if (!newInstruction) {
                const fallbacks = [
                    { title: '【角色扮演】你是失去全部法力的上神', content: '【角色扮演】你是失去全部法力的上神，跌落凡尘后被我收留，我不知你身份，只当你是失忆的异乡人，你要隐忍克制，默默守护却不能透露半分真相。' },
                    { title: '【角色扮演】你是古代将军，我是谋士', content: '你是征战沙场的将军，我是你的谋士。今天敌军压境，你找我商议对策。' },
                    { title: '【情感】暗恋十年的同学会', content: '暗恋十年，同学会上你突然坐到我身边。' }
                ];
                const rand = fallbacks[Math.floor(Math.random() * fallbacks.length)];
                newInstruction = { id: Date.now(), title: rand.title, content: rand.content, type: 'local' };
            }
            instructions.unshift(newInstruction);
            saveInstructions();
            renderMarketList();
        } catch(e) { alert('生成失败，请稍后重试'); } finally {
            btn.textContent = '智能生成';
            btn.disabled = false;
        }
    }

    function renderHistoryList() {
        const container=document.getElementById('historyList');
        if(!container) return;
        if(!conversations.length){ container.innerHTML='<div style="padding:8px 16px;color:var(--text-muted)">暂无对话</div>'; return; }

    }

    function loadCurrentConversation() {
        const conv=conversations.find(c=>c.id==currentConvId);

        if(!conv) return;
        container.innerHTML='';
        if(!conv.messages.length) container.innerHTML='<div class="welcome-message">✨ 欢迎！输入你的问题，我会用心回答你 ✨</div>';
        else conv.messages.forEach((msg,idx)=>renderMessage(msg, idx));

    function renderMessage(msg, idx) {
        const container=document.getElementById('chatMessages');
        const wrapper=document.createElement('div');
        wrapper.className=`message-wrapper message ${msg.role}`;
        const msgId = msg.id || (msg.id = Date.now()+'-'+idx);
        wrapper.setAttribute('data-msgid', msgId);
        const bubbleDiv=document.createElement('div');
        bubbleDiv.className='bubble';
        bubbleDiv.innerHTML=escapeHtml(msg.content).replace(/\n/g,'<br>');
        wrapper.appendChild(bubbleDiv);
        const actionsDiv=document.createElement('div');
        actionsDiv.className='message-actions';
        const commonActions = `<button class="msg-action" onclick="editMessage('${msgId}','${msg.role}')">✏️</button><button class="msg-action" onclick="toggleFavoriteWrapper('${msgId}','${currentConvId}','${escapeHtml(msg.content)}','${msg.role}','${escapeHtml(conversations.find(c=>c.id==currentConvId).title)}')">⭐</button><button class="msg-action" onclick="deleteMessage('${msgId}')">🗑️</button><button class="msg-action" onclick="copyMessage('${escapeHtml(msg.content)}')">📋</button>`;
        if(msg.role==='ai') actionsDiv.innerHTML = commonActions + `<button class="msg-action" onclick="regenerateAI('${msgId}')">🔄</button>`;
        else actionsDiv.innerHTML = commonActions;
        wrapper.appendChild(actionsDiv);
        container.appendChild(wrapper);

    async function sendMessage() { const inp=document.getElementById('userInput'); const msg=inp.value.trim(); if(!msg) return; DEEPSEEK_API_KEY=localStorage.getItem('deepseek_api_key'); if(!DEEPSEEK_API_KEY){ alert('请先设置API Key'); return; } addMessageToDOM(msg,'user'); const msgId=saveMessageToCurrentConv('user',msg); inp.value=''; const thinkId=addThinkingMessage(); try{ const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${DEEPSEEK_API_KEY}`},body:JSON.stringify({model:currentModel,messages:[{role:'user',content:msg}],stream:false})}); if(!res.ok)throw new Error(`请求失败`); const data=await res.json(); const aiContent=data.choices[0].message.content; removeThinkingMessage(thinkId); addMessageToDOM(aiContent,'ai'); saveMessageToCurrentConv('assistant',aiContent); }catch(e){ removeThinkingMessage(thinkId); addMessageToDOM(`出错：${e.message}`,'ai'); } }
    function addMessageToDOM(content,role){ const container=document.getElementById('chatMessages'); if(container.children.length===1 && container.children[0].classList?.contains('welcome-message')) container.innerHTML=''; const wrapper=document.createElement('div'); wrapper.className=`message-wrapper message ${role}`; const id='tmp-'+Date.now()+'-'+Math.random(); wrapper.setAttribute('data-msgid',id); wrapper.innerHTML=`<div class="bubble">${escapeHtml(content).replace(/\n/g,'<br>')}</div><div class="message-actions"><button class="msg-action" onclick="editMessage('${id}','${role}')">✏️</button><button class="msg-action" onclick="toggleFavoriteWrapper('${id}','${currentConvId}','${escapeHtml(content)}','${role}','${escapeHtml(conversations.find(c=>c.id==currentConvId)?.title||'')}')">⭐</button><button class="msg-action" onclick="deleteMessage('${id}')">🗑️</button><button class="msg-action" onclick="copyMessage('${escapeHtml(content)}')">📋</button>${role==='ai'?`<button class="msg-action" onclick="regenerateAI('${id}')">🔄</button>`:''}</div>`; container.appendChild(wrapper); scrollToBottom(); }
    function addThinkingMessage(){ const c=document.getElementById('chatMessages'); const id='think-'+Date.now(); const div=document.createElement('div'); div.id=id; div.className='message ai thinking'; div.innerHTML=`<div class="bubble"><div class="dot-floating"><span>●</span><span>●</span><span>●</span></div> 思考中...</div>`; c.appendChild(div); scrollToBottom(); return id; }

    function scrollToBottom(){ const c=document.getElementById('chatMessages'); if(c) c.scrollTop=c.scrollHeight; }
    function toggleDeepThink(){ deepThinkEnabled=!deepThinkEnabled; document.getElementById('deepThinkBtn').classList.toggle('active'); }
    function togglePreviewMode(){ previewModeEnabled=!previewModeEnabled; document.getElementById('previewModeBtn').classList.toggle('active'); }
    function closePreview(){ document.getElementById('previewModal').classList.remove('active'); }
    function escapeHtml(str){ return String(str).replace(/[&<>]/g, m=> ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    function updateStorageInfo(){ let total=0; for(let i=0;i<localStorage.length;i++) total+=(localStorage.key(i).length+(localStorage.getItem(localStorage.key(i))||'').length)*2; const used=(total/1024).toFixed(1); const percent=((total/(5*1024*1024))*100).toFixed(1); const info=document.getElementById('storageInfo'); if(info) info.innerHTML=`本地存储容量 ${used}KB / 5MB (${percent}%)`; }
    function exportAllData(){ const data={ conversations, instructions, roles, favorites, version:1 }; const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='my_deepseek_backup.json'; a.click(); URL.revokeObjectURL(url); alert('已导出全部数据'); }
    function importAllData(){ const input=document.createElement('input'); input.type='file'; input.accept='application/json'; input.onchange=e=>{ const file=e.target.files[0]; const reader=new FileReader(); reader.onload=ev=>{ try{ const data=JSON.parse(ev.target.result); if(data.conversations) conversations=data.conversations; if(data.instructions) instructions=data.instructions; if(data.roles) roles=data.roles; if(data.favorites) favorites=data.favorites; saveConversations(); saveInstructions(); saveRoles(); saveFavorites(); loadCurrentConversation(); renderHistoryList(); alert('导入成功，请刷新页面'); }catch(e){ alert('文件解析失败'); } }; reader.readAsText(file); }; input.click(); }
    document.getElementById('userInput').addEventListener('keydown', e => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); } });
    document.getElementById('userInput').addEventListener('input', function(){ this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,100)+'px'; });
</script>
</body>
</html>
